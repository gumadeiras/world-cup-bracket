name: update scores

on:
  schedule:
    - cron: "0 0-6,16-23 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-scores
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Check update window
        id: window
        run: |
          now=$(TZ=America/New_York date +%Y%m%d%H)
          if [ "$now" -le 2026062818 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "cleanup=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Remove expired updater
        if: steps.window.outputs.cleanup == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm .github/workflows/update-scores.yml
          git commit -m "Remove expired QBio score updater"
          git push
      - name: Update scores
        if: steps.window.outputs.run == 'true'
        run: node script/update_qbiowc_games.mjs
      - name: Commit changes
        id: commit
        if: steps.window.outputs.run == 'true'
        run: |
          if git diff --quiet -- data.js; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js
          git commit -m "Update QBio World Cup scores"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"
      - uses: actions/configure-pages@v6
        if: steps.commit.outputs.changed == 'true'
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        if: steps.commit.outputs.changed == 'true'
        with:
          path: .
      - uses: actions/deploy-pages@v5
        if: steps.commit.outputs.changed == 'true'
