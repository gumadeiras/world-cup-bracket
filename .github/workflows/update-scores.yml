name: update scores

on:
  schedule:
    - cron: "0 0-5,16-23 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-scores
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Check update window
        id: window
        run: |
          now=$(TZ=America/New_York date +%Y%m%d%H)
          if [ "$now" -le 2026062818 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Update scores
        if: steps.window.outputs.run == 'true'
        run: node script/update_qbiowc_games.mjs
      - name: Commit changes
        if: steps.window.outputs.run == 'true'
        run: |
          if git diff --quiet -- data.js; then
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js
          git commit -m "Update QBio World Cup scores"
          git push
